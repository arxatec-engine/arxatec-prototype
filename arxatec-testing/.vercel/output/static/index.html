<!doctype html>
<title>Redirecting...</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://arxatec.net/es/">
<body>
  <div id="loading-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4;">
    <div class="loader" style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
  </div>

  <script>
    // Redirigir después de 2 segundos
    setTimeout(function() {
      window.location.href = "/es/";
    }, 2000);
  </script>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
